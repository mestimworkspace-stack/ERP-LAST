<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Административен Панел</title>
  
  <!-- CSS Библиотеки за бързо зареждане -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    .modal-open { overflow: hidden; }
    .fc-event { cursor: pointer; transition: transform 0.1s; }
    .fc-event:hover { transform: scale(1.02); }
    .autocomplete-items {
      position: absolute; border: 1px solid #d4d4d4; border-bottom: none;
      border-top: none; z-index: 99; top: 100%; left: 0; right: 0;
      max-height: 200px; overflow-y: auto;
    }
    .autocomplete-items div {
      padding: 10px; cursor: pointer; background-color: #fff; border-bottom: 1px solid #d4d4d4;
    }
    .autocomplete-items div:hover { background-color: #e9e9e9; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

  <!-- ========================================== -->
  <!-- ЕКРАН ЗА ВХОД (LOGIN) -->
  <!-- ========================================== -->
  <div id="login-screen" class="min-height-screen flex items-center justify-center h-screen bg-gray-900">

      </div>

    </div>

  <!-- ОСНОВЕН ИНТЕРФЕЙС (СЛЕД ВХОД) -->

        <button onclick="logout()" class="md:hidden text-gray-300 hover:text-white"><i class="fa-solid fa-sign-out-alt"></i></button>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="#" onclick="showTab('calendar')" id="tab-link-calendar" class="block py-2.5 px-4 rounded transition bg-slate-700 text-white"><i class="fa-solid fa-calendar-days mr-3"></i>Календар</a>

        <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white text-sm py-2 rounded transition"><i class="fa-solid fa-sign-out-alt mr-2"></i>Изход</button>

    <!-- Основно съдържание -->
    <main class="flex-1 p-6 md:p-8 bg-gray-50 overflow-x-hidden">
      
      <!-- ==================== ТАБ: КАЛЕНДАР ==================== -->

        </div>

        <div class="bg-white p-4 rounded-lg shadow-sm border flex items-center gap-3">

        </div>

          <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
            <thead class="bg-gray-50 text-gray-500 uppercase font-semibold">

      <!-- ==================== ТАБ: ЕКИП ==================== -->

        <div class="bg-white rounded-lg shadow overflow-x-auto border">
          <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
            <thead class="bg-gray-50 text-gray-500 uppercase font-semibold">
              <tr>
                <th class="px-6 py-3">Име</th>
                <th class="px-6 py-3">Имейл</th>
                <th class="px-6 py-3">Роля</th>
                <th class="px-6 py-3">Статус</th>

    </main>
  </div>

  <!-- МОДАЛИ -->
  <!-- МОДАЛ: ПОРЪЧКА -->

            <option value="Изхвърляне строителни">🏗️ Изхвърляне строителни (Червен)</option>
            <option value="Изхвърляне мебели">🛋️ Изхвърляне мебели (Оранжев)</option>

          <input type="text" id="order-address" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">

            <label class="block text-sm font-medium text-gray-700 mb-1">Начало</label>
            <input type="time" id="order-start-time" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>

            <input type="time" id="order-end-time" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
        </div>

        <div>

          <select id="order-status" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">

            <option value="In Progress">⚡ В изпълнение</option>

  <!-- МОДАЛ: КЛИЕНТ -->

  <!-- МОДАЛ: СЛУЖИТЕЛ -->

        <h3 id="team-modal-title" class="font-bold text-lg">Добави Служител</h3>

        <button onclick="closeTeamModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-lg font-semibold transition">Отказ</button>
        <button onclick="saveTeamMember()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-semibold transition">Запази</button>
      </footer>
    </div>

  <script>
    // ==========================================
    // ВАШИЯТ GOOGLE WEB APP URL СЕ ЗАПИСВА ТУК ЕДНОКРАТНО:
    // ==========================================
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzyT0aHEjFB86a8iey_aOjeKPaAUpNnN3tkEHAb3yZZxj2PrNivTfT_LO0blOdXOuFejQ/exec";

    let calendar = null;
    let dbClients = [];
    let dbTeam = [];
    let dbOrders = [];

    window.addEventListener('DOMContentLoaded', () => {
      const savedToken = localStorage.getItem('erp_token');
      const savedRole = localStorage.getItem('erp_role');
      const savedName = localStorage.getItem('erp_name');

      if (savedToken && savedRole === 'Admin') {
        document.getElementById('admin-name').innerText = savedName;
        showMainInterface();
      } else {
        showLoginScreen();
      }
    });

    // ОПТИМИЗИРАНА И БЕЗОПАСНА ЗАЯВКА КЪМ GOOGLE С REDIRECT
    async function apiRequest(action, payload = {}) {
      const token = localStorage.getItem('erp_token');
      const body = { action, payload, token };
      
      try {
        const response = await fetch(GOOGLE_WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(body),
          redirect: 'follow' // <<-- ИЗКЛЮЧИТЕЛНО ВАЖНО ЗА GOOGLE И CORS!
        });
        const result = await response.json();
        if (result.success === false) {
          throw new Error(result.error);
        }
        return result;
      } catch (err) {
        alert("Грешка при комуникация: " + err.message);
        throw err;
      }
    }

    async function attemptLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const errorEl = document.getElementById('login-error');

      errorEl.classList.add('hidden');

      if (!email || !password) {
        errorEl.innerText = "Моля, попълнете всички полета.";
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        const result = await apiRequest('login', { email, password });
        if (result.success) {
          if (result.role !== "Admin") {
            alert("Този панел е достъпен само за администратори.");
            return;
          }
          localStorage.setItem('erp_token', result.token);
          localStorage.setItem('erp_role', result.role);
          localStorage.setItem('erp_name', result.name);
          document.getElementById('admin-name').innerText = result.name;
          showMainInterface();
        }
      } catch (err) {
        errorEl.innerText = err.message || "Грешка при вход.";
        errorEl.classList.remove('hidden');
      }
    }

    function logout() {
      localStorage.removeItem('erp_token');
      localStorage.removeItem('erp_role');
      localStorage.removeItem('erp_name');
      showLoginScreen();
    }

    function showLoginScreen() {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('main-interface').classList.add('hidden');
    }

    async function showMainInterface() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-interface').classList.remove('hidden');
      
      initCalendar();
      await loadAllData();
    }

    function showTab(tabName) {
      document.getElementById('tab-calendar').classList.add('hidden');
      document.getElementById('tab-clients').classList.add('hidden');
      document.getElementById('tab-team').classList.add('hidden');
      
      document.getElementById('tab-link-calendar').className = "block py-2.5 px-4 rounded transition text-gray-300 hover:bg-slate-700 hover:text-white";
      document.getElementById('tab-link-clients').className = "block py-2.5 px-4 rounded transition text-gray-300 hover:bg-slate-700 hover:text-white";
      document.getElementById('tab-link-team').className = "block py-2.5 px-4 rounded transition text-gray-300 hover:bg-slate-700 hover:text-white";

      document.getElementById(`tab-${tabName}`).classList.remove('hidden');
      document.getElementById(`tab-link-${tabName}`).className = "block py-2.5 px-4 rounded transition bg-slate-700 text-white font-bold";

      if (tabName === 'calendar' && calendar) {
        calendar.render();
      }
    }

    async function loadAllData() {
      try {
        const clientsRes = await apiRequest('getClients');
        dbClients = clientsRes.data;
        renderClientsTable();
        initAutocomplete();

        const teamRes = await apiRequest('getTeam');
        dbTeam = teamRes.data;
        renderTeamTable();
        renderTeamCheckboxes();

        const ordersRes = await apiRequest('getOrders');
        dbOrders = ordersRes.data;
        renderCalendarEvents();
      } catch (err) {
        console.error("Грешка при синхронизация: " + err);
      }
    }

    function renderClientsTable() {
      const search = document.getElementById('client-search').value.toLowerCase().trim();
      const body = document.getElementById('clients-table-body');
      body.innerHTML = "";

      const filtered = dbClients.filter(c => 
        c.name.toLowerCase().includes(search) || 
        c.phone.includes(search)
      );

      filtered.forEach(c => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 border-b";
        tr.innerHTML = `
          <td class="px-6 py-4 font-semibold text-gray-900">${c.name}</td>
          <td class="px-6 py-4 text-gray-600">${c.phone}</td>
          <td class="px-6 py-4 text-gray-600">${c.address}</td>
          <td class="px-6 py-4 text-xs text-gray-500">${c.notes || '-'}</td>
          <td class="px-6 py-4 text-right">
            <button onclick='editClient(${JSON.stringify(c)})' class="text-indigo-600 hover:text-indigo-900 font-medium mr-3"><i class="fa-solid fa-edit"></i> Редакция</button>
            <button onclick="deleteClient('${c.id}')" class="text-red-600 hover:text-red-900 font-medium"><i class="fa-solid fa-trash"></i></button>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    function openClientModal() {
      document.getElementById('client-id').value = "";
      document.getElementById('client-name').value = "";
      document.getElementById('client-phone').value = "";
      document.getElementById('client-address').value = "";
      document.getElementById('client-notes').value = "";
      document.getElementById('client-modal-title').innerText = "Добави Нов Клиент";
      document.getElementById('client-modal').classList.remove('hidden');
    }

    function editClient(client) {
      document.getElementById('client-id').value = client.id;
      document.getElementById('client-name').value = client.name;
      document.getElementById('client-phone').value = client.phone;
      document.getElementById('client-address').value = client.address;
      document.getElementById('client-notes').value = client.notes;
      document.getElementById('client-modal-title').innerText = "Редакция на Клиент";
      document.getElementById('client-modal').classList.remove('hidden');
    }

    function closeClientModal() {
      document.getElementById('client-modal').classList.add('hidden');
    }

    async function saveClient() {
      const id = document.getElementById('client-id').value;
      const name = document.getElementById('client-name').value.trim();
      const phone = document.getElementById('client-phone').value.trim();
      const address = document.getElementById('client-address').value.trim();
      const notes = document.getElementById('client-notes').value.trim();

      if (!name || !phone) {
        alert("Името и телефонът са задължителни!");
        return;
      }

      await apiRequest('saveClient', { id, name, phone, address, notes });
      closeClientModal();
      await loadAllData();
    }

    async function deleteClient(id) {
      if (!confirm("Сигурни ли сте, че искате да изтриете този клиент?")) return;
      await apiRequest('deleteClient', { id });
      await loadAllData();
    }

    function renderTeamTable() {
      const search = document.getElementById('team-search').value.toLowerCase().trim();
      const body = document.getElementById('team-table-body');
      body.innerHTML = "";

      const filtered = dbTeam.filter(t => 
        t.name.toLowerCase().includes(search) || 
        t.email.toLowerCase().includes(search)
      );

      filtered.forEach(t => {
        const isAct = t.status === 'Active';
        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 border-b";
        tr.innerHTML = `
          <td class="px-6 py-4 font-semibold text-gray-900">${t.name}</td>
          <td class="px-6 py-4 text-gray-600">${t.email}</td>
          <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-full text-xs font-semibold ${t.role === 'Admin' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800'}">${t.role}</span></td>
          <td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-xs font-bold ${isAct ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${isAct ? 'Активен' : 'Неактивен'}</span></td>
          <td class="px-6 py-4 text-right">
            <button onclick='editTeam(${JSON.stringify(t)})' class="text-indigo-600 hover:text-indigo-900 font-medium"><i class="fa-solid fa-edit"></i> Настройка</button>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    function openTeamModal() {
      document.getElementById('team-id').value = "";
      document.getElementById('team-name').value = "";
      document.getElementById('team-email').value = "";
      document.getElementById('team-password').value = "";
      document.getElementById('team-role').value = "Employee";
      document.getElementById('team-status').value = "Active";
      document.getElementById('team-modal-title').innerText = "Нов Служител";
      document.getElementById('team-modal').classList.remove('hidden');
    }

    function editTeam(member) {
      document.getElementById('team-id').value = member.id;
      document.getElementById('team-name').value = member.name;
      document.getElementById('team-email').value = member.email;
      document.getElementById('team-password').value = "";
      document.getElementById('team-role').value = member.role;
      document.getElementById('team-status').value = member.status;
      document.getElementById('team-modal-title').innerText = "Настройка на Профил";
      document.getElementById('team-modal').classList.remove('hidden');
    }

    function closeTeamModal() {
      document.getElementById('team-modal').classList.add('hidden');
    }

    async function saveTeamMember() {
      const id = document.getElementById('team-id').value;
      const name = document.getElementById('team-name').value.trim();
      const email = document.getElementById('team-email').value.trim();
      const password = document.getElementById('team-password').value;
      const role = document.getElementById('team-role').value;
      const status = document.getElementById('team-status').value;

      if (!name || !email) {
        alert("Име и имейл са задължителни!");
        return;
      }
      if (!id && !password) {
        alert("Паролата е задължителна за нов служител!");
        return;
      }

      await apiRequest('saveTeamMember', { id, name, email, password, role, status });
      closeTeamModal();
      await loadAllData();
    }

    function initAutocomplete() {
      const input = document.getElementById('order-client-search');
      const list = document.getElementById('autocomplete-list');

      input.addEventListener('input', function() {
        const val = this.value.toLowerCase().trim();
        list.innerHTML = "";
        if (!val) {
          list.classList.add('hidden');
          return;
        }

        const matches = dbClients.filter(c => 
          c.name.toLowerCase().includes(val) || 
          c.phone.includes(val)
        );

        if (matches.length === 0) {
          list.classList.add('hidden');
          return;
        }

        matches.forEach(m => {
          const div = document.createElement('div');
          div.innerHTML = `<strong>${m.name}</strong> - 📱 ${m.phone}`;
          div.addEventListener('click', () => {
            document.getElementById('order-client-id').value = m.id;
            document.getElementById('order-client-name').value = m.name;
            document.getElementById('order-client-phone').value = m.phone;
            document.getElementById('order-address').value = m.address;
            input.value = m.name;
            list.classList.add('hidden');
          });
          list.appendChild(div);
        });
        list.classList.remove('hidden');
      });

      document.addEventListener('click', (e) => {
        if (e.target !== input) list.classList.add('hidden');
      });
    }

    function renderTeamCheckboxes() {
      const container = document.getElementById('team-checkbox-list');
      container.innerHTML = "";
      const activeTeam = dbTeam.filter(t => t.status === "Active");
      
      activeTeam.forEach(t => {
        const label = document.createElement('label');
        label.className = "flex items-center gap-2 p-2 bg-white border rounded hover:bg-gray-100 cursor-pointer text-sm font-medium";
        label.innerHTML = `
          <input type="checkbox" name="assigned-employees" value="${t.id}" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4">
          <span>${t.name}</span>
        `;
        container.appendChild(label);
      });
    }

    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'bg',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        buttonText: {
          today: 'Днес',
          month: 'Месец',
          week: 'Седмица',
          day: 'Ден'
        },
        firstDay: 1,
        eventClick: function(info) {
          const order = dbOrders.find(o => o.id == info.event.id);
          if (order) editOrder(order);
        },
        dateClick: function(info) {
          openOrderModal(info.dateStr);
        }
      });
      calendar.render();
    }

    function renderCalendarEvents() {
      if (!calendar) return;
      calendar.removeAllEvents();

      const search = document.getElementById('order-search').value.toLowerCase().trim();
      const filtered = dbOrders.filter(o => 
        !search || 
        o.client_name.toLowerCase().includes(search) || 
        o.client_phone.includes(search)
      );

      filtered.forEach(o => {
        const startStr = `${o.date}T${o.start_time || '09:00'}:00`;
        const endStr = `${o.date}T${o.end_time || '10:00'}:00`;

        calendar.addEvent({
          id: o.id,
          title: `[${o.service_type}] ${o.client_name}`,
          start: startStr,
          end: endStr,
          backgroundColor: o.color || '#3788d8',
          borderColor: o.color || '#3788d8'
        });
      });
    }

    function filterCalendarEvents() {
      renderCalendarEvents();
    }

    function openOrderModal(selectedDate = "") {
      document.getElementById('order-id').value = "";
      document.getElementById('order-client-id').value = "";
      document.getElementById('order-client-search').value = "";
      document.getElementById('order-client-name').value = "";
      document.getElementById('order-client-phone').value = "";
      document.getElementById('order-service-type').value = "Преместване";
      document.getElementById('order-desc').value = "";
      document.getElementById('order-address').value = "";
      document.getElementById('order-start-time').value = "09:00";
      document.getElementById('order-end-time').value = "10:00";
      document.getElementById('order-status').value = "Pending";
      
      const checkboxes = document.querySelectorAll('input[name="assigned-employees"]');
      checkboxes.forEach(cb => cb.checked = false);

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('order-date').value = selectedDate || today;

      document.getElementById('order-modal-title').innerText = "Създаване на Поръчка";
      document.getElementById('btn-delete-order').classList.add('hidden');
      document.getElementById('order-modal').classList.remove('hidden');
    }

    function editOrder(order) {
      document.getElementById('order-id').value = order.id;
      document.getElementById('order-client-id').value = order.client_id;
      document.getElementById('order-client-search').value = order.client_name;
      document.getElementById('order-client-name').value = order.client_name;
      document.getElementById('order-client-phone').value = order.client_phone;
      document.getElementById('order-service-type').value = order.service_type;
      document.getElementById('order-desc').value = order.description;
      document.getElementById('order-address').value = order.address;
      document.getElementById('order-date').value = order.date.split('T')[0];
      document.getElementById('order-start-time').value = order.start_time;
      document.getElementById('order-end-time').value = order.end_time;
      document.getElementById('order-status').value = order.status;

      const checkboxes = document.querySelectorAll('input[name="assigned-employees"]');
      checkboxes.forEach(cb => {
        cb.checked = order.assigned_ids.includes(cb.value.toString());
      });

      document.getElementById('order-modal-title').innerText = "Детайли / Редакция на поръчка";
      document.getElementById('btn-delete-order').classList.remove('hidden');
      document.getElementById('order-modal').classList.remove('hidden');
    }

    function closeOrderModal() {
      document.getElementById('order-modal').classList.add('hidden');
    }

    async function saveOrder() {
      const id = document.getElementById('order-id').value;
      const client_id = document.getElementById('order-client-id').value;
      const client_name = document.getElementById('order-client-name').value;
      const client_phone = document.getElementById('order-client-phone').value;
      const service_type = document.getElementById('order-service-type').value;
      const description = document.getElementById('order-desc').value.trim();
      const address = document.getElementById('order-address').value.trim();
      const date = document.getElementById('order-date').value;
      const start_time = document.getElementById('order-start-time').value;
      const end_time = document.getElementById('order-end-time').value;
      const status = document.getElementById('order-status').value;

      if (!client_id) {
        alert("Моля, изберете клиент!");
        return;
      }
      if (!date || !start_time || !end_time) {
        alert("Моля, попълнете дата и часове!");
        return;
      }

      const checkedBoxes = document.querySelectorAll('input[name="assigned-employees"]:checked');
      const assigned_ids = Array.from(checkedBoxes).map(cb => cb.value);

      await apiRequest('saveOrder', {
        id, client_id, client_name, client_phone, service_type, description, address, date, start_time, end_time, assigned_ids, status
      });

      closeOrderModal();
      await loadAllData();
    }

    async function deleteOrder() {
      const id = document.getElementById('order-id').value;
      if (!id) return;
      if (!confirm("Сигурни ли сте, че искате да изтриете тази поръчка?")) return;

      await apiRequest('deleteOrder', { id });
      closeOrderModal();
      await loadAllData();
    }
  </script>
</body>
</html>
